services:
  nginx:
    image: nginx
    container_name: nginx
    depends_on:
      - wordpress
    ports:
      - "443:443"
      - "80:80"
    networks:
      - cloud_net
    volumes:
      - "wordpress_vol:/var/www/html/"
      - "/opt/app/certs:/tmp/certi/"
      - "/opt/app/nginx.conf:/etc/nginx/conf.d/default.conf"
    restart: unless-stopped
    env_file:
      - .env

  mysql:
    image: mysql
    container_name: mysql
    networks:
      - cloud_net
    volumes:
      - "data_base_vol:/var/lib/mysql/"
    restart: unless-stopped
    env_file:
      - .env

  wordpress:
    image: wordpress:fpm
    container_name: wordpress
    depends_on:
      - mysql
    networks:
      - cloud_net
    volumes:
      - "wordpress_vol:/var/www/html/"
    restart: unless-stopped
    env_file:
      - .env

  # ── NEW: runs once, configures WP, then exits ──────────────────────────────
  wp-cli:
    image: wordpress:cli
    container_name: wp-cli
    depends_on:
      - wordpress
      - mysql
    networks:
      - cloud_net
    volumes:
      - "wordpress_vol:/var/www/html/"
      - "/opt/app/wp-setup.sh:/usr/local/bin/wp-setup.sh"
    user: "33:33"   # www-data — same user as wordpress:fpm writes files as
    entrypoint: ["bash", "/usr/local/bin/wp-setup.sh"]
    restart: on-failure   # retries if MySQL isn't ready yet; stops once done
    env_file:
      - .env

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    depends_on:
      - mysql
    networks:
      - cloud_net
    restart: unless-stopped
    env_file:
      - .env

networks:
  cloud_net:

volumes:
  wordpress_vol:
  data_base_vol:
